name: apilearning
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.6.0
  intl: ^0.18.1
  google_maps_flutter: ^2.14.0
  get: ^4.7.3
  shared_preferences: ^2.5.4
  device_info_plus: ^12.3.0
  geolocator: ^11.0.0
  maps_launcher: ^3.0.0+1
  pinput: ^6.0.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  provider: ^6.1.5+1
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  safe_device: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/

  # To add custom fonts to your application (uncomment and replace paths as needed)
  # fonts:
