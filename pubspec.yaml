name: velox
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  http: ^1.6.0
  pinput: ^6.0.1
  carousel_slider: ^5.1.1
  device_info_plus: ^12.3.0
  shared_preferences: ^2.5.4
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.0
  google_api_headers: ^4.6.2
  google_places_flutter: ^2.0.9
  flutter_svg: ^2.2.3
  image_picker: ^1.2.1
  webview_flutter: ^4.13.1
  socket_io_client: ^3.1.4
  flutter_local_notifications: ^20.1.0
  firebase_messaging: ^16.1.1
  firebase_core: ^4.7.0
  youtube_player_flutter: ^9.1.3
  html_unescape: ^2.0.0
  url_launcher: ^6.3.2
  safe_device: ^1.3.8
  pdf: ^3.11.3
  path_provider: ^2.1.5
  open_file: ^3.5.11
  upi_pay: ^1.1.0
  flutter_inappwebview: ^6.1.5
  video_player: ^2.7.2
  visibility_detector: ^0.4.0+2
  share_plus: ^12.0.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_html: ^3.0.0
  phonepe_payment_sdk: ^3.0.2
  clarity_flutter: ^1.7.1
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  package_info_plus: ^8.3.1
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
    - assets/fonts/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700