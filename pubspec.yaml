name: apilearning
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.6.0
  intl: ^0.18.1
  google_maps_flutter: ^2.14.0
  get: ^4.7.3
  shared_preferences: ^2.5.4
  device_info_plus: ^12.3.0
  geolocator: ^11.0.0
  maps_launcher: ^3.0.0+1
  pinput: ^6.0.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  provider: ^6.1.5+1
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  safe_device: ^1.3.8
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_polyline_points: ^3.1.0
  flutter_tts: ^4.2.5
  shimmer: ^3.0.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  clarity_flutter: ^1.7.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # To add custom fonts to your application (uncomment and replace paths as needed)
